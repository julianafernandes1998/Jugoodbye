  <style>
    body {

      display: flex;
      flex-direction: column;
      min-height: 100vh;
      text-align: center;

    h1 {
      color: #4b5320;
      margin-top: 30px;
      font-size: 1.8em;
    }

    #container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 20px;
    }

    input {

      font-size: 1.2em;
      border-radius: 10px;
      border: 2px solid #4b5320;
      text-align: center;
      width: 70%;
      max-width: 300px;
      outline: none;
    }

    .countdown-grid {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: bold;
      color: #4b5320;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 2.5em;
      min-width: 70px;
    }

    .label {
      font-size: 0.4em;
      margin-top: 5px;
    }

    .colon {
      font-size: 2.5em;
    }

    #finalMessage {
      display: none;
      color: #4b5320;
      font-size: 1.4em;
      padding: 20px;
      max-width: 80%;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #popupBox {
      background-color: #f5fff5;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 80%;
      max-width: 300px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    #popupBox p {
      color: #4b5320;
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    #popupBox button {
      background-color: #4b5320;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>

    function atualizarCountdown() {
      const agora = new Date().getTime();
      const diferenca = alvoData - agora;

      if (diferenca <= 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("finalMessage").style.display = "block";
        unlocked = true;
        return;
      }

      const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
      const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
      const segundos = Math.floor((diferenca / 1000) % 60);

      function formatar(n) {
        return n < 10 ? "0" + n : n;
      }

      document.getElementById("days").innerHTML = dias;
      document.getElementById("hours").innerHTML = formatar(horas);
      document.getElementById("minutes").innerHTML = formatar(minutos);
      document.getElementById("seconds").innerHTML = formatar(segundos);
    }
